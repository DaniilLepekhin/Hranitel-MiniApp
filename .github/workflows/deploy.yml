name: Deploy КОД ДЕНЕГ 4.0 to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # 🔍 Quality Gate: Lint and Typecheck before deploy
  quality-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        working-directory: ./backend
        run: bun install

      - name: Backend TypeScript check
        working-directory: ./backend
        run: bun run typecheck || echo "⚠️ TypeScript errors found (non-blocking)"
        continue-on-error: true

      - name: Install frontend dependencies
        working-directory: ./webapp
        run: npm ci

      - name: Frontend TypeScript check
        working-directory: ./webapp
        run: npm run lint || echo "⚠️ Lint errors found (non-blocking)"
        continue-on-error: true

      - name: Frontend build check
        working-directory: ./webapp
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://app.successkod.com
          NEXT_PUBLIC_WEBAPP_URL: https://app.successkod.com

  deploy:
    runs-on: ubuntu-latest
    needs: quality-check

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Production Server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          command_timeout: 10m
          script: |
            echo "🚀 Starting deployment..."

            # Navigate to project directory
            cd /var/www/hranitel || {
              echo "📁 Creating project directory..."
              mkdir -p /var/www/hranitel
              cd /var/www/hranitel
              git clone https://github.com/DaniilLepekhin/Hranitel-MiniApp.git .
            }

            # Pull latest changes
            echo "📥 Pulling latest code..."
            git fetch origin
            git reset --hard origin/main

            # Backend deployment
            echo "🔧 Deploying Backend..."
            cd backend

            # Export environment variables (for migrations and health checks)
            export DATABASE_URL="${{ secrets.DATABASE_URL }}"
            export JWT_SECRET="${{ secrets.JWT_SECRET }}"
            export REDIS_URL="${{ secrets.REDIS_URL }}"
            export PORT="3002"
            export NODE_ENV="production"
            export WEBAPP_URL="https://app.successkod.com"
            export CORS_ORIGIN="${{ secrets.CORS_ORIGIN }}"
            export TELEGRAM_BOT_TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}"
            export API_URL="https://app.successkod.com"
            export TELEGRAM_WEBHOOK_SECRET="${{ secrets.TELEGRAM_WEBHOOK_SECRET }}"
            export TELEGRAM_BOT_USERNAME="${{ secrets.TELEGRAM_BOT_USERNAME }}"
            export OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}"
            export GETCOURSE_SECRET="${{ secrets.GETCOURSE_SECRET }}"
            export ADMIN_SECRET="${{ secrets.ADMIN_SECRET }}"
            export CLOUDPAYMENTS_API_SECRET="${{ secrets.CLOUDPAYMENTS_API_SECRET }}"

            # Also create .env file for PM2 persistence (Bun auto-loads .env)
            echo "DATABASE_URL=$DATABASE_URL" > .env
            echo "PORT=$PORT" >> .env
            echo "NODE_ENV=$NODE_ENV" >> .env
            echo "WEBAPP_URL=$WEBAPP_URL" >> .env
            echo "JWT_SECRET=$JWT_SECRET" >> .env
            echo "CORS_ORIGIN=$CORS_ORIGIN" >> .env
            echo "TELEGRAM_BOT_TOKEN=$TELEGRAM_BOT_TOKEN" >> .env
            echo "API_URL=$API_URL" >> .env
            echo "TELEGRAM_WEBHOOK_SECRET=$TELEGRAM_WEBHOOK_SECRET" >> .env
            echo "TELEGRAM_BOT_USERNAME=$TELEGRAM_BOT_USERNAME" >> .env
            echo "REDIS_URL=$REDIS_URL" >> .env
            echo "OPENAI_API_KEY=$OPENAI_API_KEY" >> .env
            echo "OLD_DATABASE_URL=${{ secrets.OLD_DATABASE_URL }}" >> .env
            echo "GETCOURSE_SECRET=$GETCOURSE_SECRET" >> .env
            echo "TELEGRAM_WEBHOOK_URL=https://app.successkod.com" >> .env
            echo "ADMIN_SECRET=$ADMIN_SECRET" >> .env
            echo "CLOUDPAYMENTS_API_SECRET=$CLOUDPAYMENTS_API_SECRET" >> .env

            # Install Bun if not exists
            if ! command -v bun &> /dev/null; then
              echo "📦 Installing Bun..."
              curl -fsSL https://bun.sh/install | bash
              export BUN_INSTALL="$HOME/.bun"
              export PATH="$BUN_INSTALL/bin:$PATH"
            fi
            export BUN_INSTALL="$HOME/.bun"
            export PATH="$BUN_INSTALL/bin:$PATH"

            # Clear Bun cache
            rm -rf node_modules
            rm -rf .bun-cache

            bun install

            # 🔧 Run ALL database migrations (including new ones 0004, 0005)
            echo "📊 Running database migrations..."
            cd /var/www/hranitel/backend

            # Apply migration 0003 (if not already applied)
            echo "📊 Checking migration 0003..."
            psql "$DATABASE_URL" -c "SELECT 1 FROM gift_subscriptions LIMIT 1" 2>/dev/null || {
              echo "📊 Applying migration 0003_add_onboarding_and_gift_fields.sql..."
              psql "$DATABASE_URL" -f drizzle/migrations/0003_add_onboarding_and_gift_fields.sql
            }

            # Apply migration 0004 (payments table)
            echo "📊 Checking migration 0004..."
            psql "$DATABASE_URL" -c "SELECT 1 FROM payments LIMIT 1" 2>/dev/null || {
              echo "📊 Applying migration 0004_create_payments_table.sql..."
              psql "$DATABASE_URL" -f drizzle/migrations/0004_create_payments_table.sql
              echo "✅ Payments table created"
            }

            # Apply migration 0005 (performance indexes + materialized views)
            echo "📊 Checking migration 0005..."
            psql "$DATABASE_URL" -c "SELECT 1 FROM city_ratings_cache LIMIT 1" 2>/dev/null || {
              echo "📊 Applying migration 0005_add_performance_indexes_and_views.sql..."
              psql "$DATABASE_URL" -f drizzle/migrations/0005_add_performance_indexes_and_views.sql
              echo "✅ Performance indexes and materialized views created"

              # Initial refresh of materialized views
              echo "🔄 Initial refresh of materialized views..."
              psql "$DATABASE_URL" -c "SELECT refresh_ratings_cache();"
            }

            # Apply migration 0006 (club funnel progress table)
            echo "📊 Checking migration 0006..."
            psql "$DATABASE_URL" -c "SELECT 1 FROM club_funnel_progress LIMIT 1" 2>/dev/null || {
              echo "📊 Applying migration 0006_add_club_funnel_progress.sql..."
              psql "$DATABASE_URL" -f drizzle/migrations/0006_add_club_funnel_progress.sql
              echo "✅ Club funnel progress table created"
            }

            # Apply migration 0007 (add chislo column - uses IF NOT EXISTS, safe to run multiple times)
            echo "📊 Applying migration 0007_add_chislo_to_club_funnel.sql..."
            psql "$DATABASE_URL" -f drizzle/migrations/0007_add_chislo_to_club_funnel.sql && echo "✅ Migration 0007 completed"

            # Apply migration 0011 (add city_chat_id to users - uses IF NOT EXISTS, safe to run multiple times)
            echo "📊 Applying migration 0011_add_city_chat_id_to_users.sql..."
            psql "$DATABASE_URL" -f drizzle/migrations/0011_add_city_chat_id_to_users.sql && echo "✅ Migration 0011 completed"

            # Apply migration 0012 (add character test steps to enum - uses IF NOT EXISTS, safe to run multiple times)
            echo "📊 Applying migration 0012_add_character_test_steps.sql..."
            psql "$DATABASE_URL" -f drizzle/migrations/0012_add_character_test_steps.sql && echo "✅ Migration 0012 completed"

            # Apply migration 0013 (add is_ambassador to users - uses IF NOT EXISTS, safe to run multiple times)
            echo "📊 Applying migration 0013_add_is_ambassador_to_users.sql..."
            psql "$DATABASE_URL" -f drizzle/migrations/0013_add_is_ambassador_to_users.sql && echo "✅ Migration 0013 completed"

            # Apply migration 0014 (add energy expiry fields - uses IF NOT EXISTS, safe to run multiple times)
            echo "📊 Applying migration 0014_add_energy_expiry.sql..."
            psql "$DATABASE_URL" -f drizzle/migrations/0014_add_energy_expiry.sql && echo "✅ Migration 0014 completed"

            # Apply migration 0015 (add user_sessions table for Time in App - uses IF NOT EXISTS, safe to run multiple times)
            echo "📊 Applying migration 0015_add_user_sessions.sql..."
            psql "$DATABASE_URL" -f drizzle/migrations/0015_add_user_sessions.sql && echo "✅ Migration 0015 completed"

            echo "✅ All migrations applied successfully!"

            # 🔍 Pre-deployment health check
            echo "🔍 Running pre-deployment health checks..."

            # Check database connection
            psql "$DATABASE_URL" -c "SELECT 1" > /dev/null && echo "✅ Database connection OK" || {
              echo "❌ Database connection FAILED"
              exit 1
            }

            # Check Redis connection
            redis-cli ping > /dev/null && echo "✅ Redis connection OK" || echo "⚠️ Redis not available (optional)"

            # 💾 Pre-deploy DB backup (keeps last 7 backups)
            echo "💾 Creating pre-deploy DB backup..."
            BACKUP_DIR="/var/backups/hranitel"
            mkdir -p "$BACKUP_DIR"
            BACKUP_FILE="$BACKUP_DIR/pre-deploy-$(date +%Y%m%d-%H%M%S).sql.gz"
            pg_dump "$DATABASE_URL" | gzip > "$BACKUP_FILE" && echo "✅ DB backup saved: $BACKUP_FILE" || echo "⚠️ DB backup failed (non-fatal)"
            # Keep only last 7 backups
            ls -t "$BACKUP_DIR"/pre-deploy-*.sql.gz 2>/dev/null | tail -n +8 | xargs rm -f 2>/dev/null || true

            # Setup PM2 log rotation (idempotent)
            pm2 install pm2-logrotate 2>/dev/null || true
            pm2 set pm2-logrotate:max_size 50M 2>/dev/null || true
            pm2 set pm2-logrotate:retain 7 2>/dev/null || true
            pm2 set pm2-logrotate:compress true 2>/dev/null || true

            # Backup current backend process (for rollback)
            echo "💾 Creating backup of current backend..."
            pm2 save --force

            # Restart backend service with zero-downtime reload (port 3002)
            echo "🔄 Reloading backend (zero-downtime)..."
            cd /var/www/hranitel/backend
            if pm2 describe hranitel-backend > /dev/null 2>&1; then
              pm2 reload hranitel-backend --update-env
            else
              pm2 start ecosystem.config.cjs
            fi
            pm2 save

            # Wait for backend to start
            echo "⏳ Waiting for backend to start..."
            sleep 10

            # 🏥 Post-deployment health check
            echo "🏥 Running post-deployment health checks..."

            # Check backend health endpoint
            HEALTH_CHECK=$(curl -s http://localhost:3002/health || echo "FAILED")
            if echo "$HEALTH_CHECK" | grep -q "ok"; then
              echo "✅ Backend health check PASSED"
            else
              echo "❌ Backend health check FAILED"
              echo "🔄 Rolling back to previous version..."
              pm2 resurrect
              exit 1
            fi

            # Check backend readiness (DB + Redis)
            READY_CHECK=$(curl -s http://localhost:3002/health/ready || echo "FAILED")
            if echo "$READY_CHECK" | grep -q "ready"; then
              echo "✅ Backend readiness check PASSED"
            else
              echo "⚠️ Backend not fully ready (DB or Redis issue)"
              echo "Response: $READY_CHECK"
            fi

            # Check scheduler queue size
            QUEUE_SIZE=$(redis-cli ZCARD scheduler:queue 2>/dev/null || echo "0")
            echo "📊 Scheduler queue size: $QUEUE_SIZE tasks"
            if [ "$QUEUE_SIZE" -gt 1000 ]; then
              echo "⚠️ WARNING: Large scheduler queue detected!"
            fi

            # 🔄 Переустановка webhook после деплоя (SSL может сбоить во время restart)
            echo "🤖 Re-setting Telegram webhook..."
            WEBHOOK_RESULT=$(curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/setWebhook" \
              -H "Content-Type: application/json" \
              -d '{"url": "https://app.successkod.com/api/v1/bot/webhook", "secret_token": "${{ secrets.TELEGRAM_WEBHOOK_SECRET }}", "allowed_updates": ["message", "inline_query", "callback_query", "my_chat_member", "chat_member"]}')
            echo "Webhook result: $WEBHOOK_RESULT"

            # Frontend deployment
            echo "🎨 Deploying Frontend..."
            cd ../webapp

            # Remove .env.local to use .env.production from repo
            rm -f .env.local

            # Clean build artifacts and node_modules
            echo "🧹 Cleaning build artifacts..."
            rm -rf .next node_modules
            
            # Install/update dependencies
            echo "📦 Installing dependencies..."
            npm ci --include=dev 2>/dev/null || npm install --include=dev

            # Build frontend
            echo "🏗️ Building frontend..."
            npm run build

            # Copy static files for standalone mode (required by Next.js)
            echo "📦 Copying static files..."
            cp -r .next/static .next/standalone/.next/static 2>/dev/null || echo "⚠️ Static files already copied"
            cp -r public .next/standalone/public 2>/dev/null || echo "⚠️ Public files already copied"
            
            # Verify critical files exist
            if [ ! -f ".next/standalone/public/sw.js" ]; then
              echo "❌ Service worker not found!"
              exit 1
            fi
            echo "✅ Service worker verified"

            # Restart frontend service (port 3003)
            echo "🔄 Restarting frontend..."
            pm2 delete hranitel-frontend 2>/dev/null || true
            cd .next/standalone
            PORT=3003 pm2 start --name hranitel-frontend --cwd /var/www/hranitel/webapp/.next/standalone node -- server.js
            pm2 save

            # Setup Nginx for app.successkod.com (main) and redirect from hranitel
            echo "🌐 Configuring Nginx..."
            
            # Main app.successkod.com config (should already exist, just verify)
            if [ ! -f /etc/nginx/sites-available/app.successkod.com ]; then
              echo "⚠️ Creating app.successkod.com config..."
              printf 'server {\n    server_name app.successkod.com;\n    location / {\n        proxy_pass http://localhost:3003;\n        proxy_http_version 1.1;\n        proxy_set_header Upgrade $http_upgrade;\n        proxy_set_header Connection upgrade;\n        proxy_set_header Host $host;\n        proxy_cache_bypass $http_upgrade;\n        proxy_set_header X-Real-IP $remote_addr;\n        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;\n        proxy_set_header X-Forwarded-Proto $scheme;\n        proxy_read_timeout 300s;\n        proxy_connect_timeout 300s;\n        proxy_send_timeout 300s;\n    }\n    location /api/ {\n        proxy_pass http://localhost:3002/api/;\n        proxy_http_version 1.1;\n        proxy_set_header Upgrade $http_upgrade;\n        proxy_set_header Connection upgrade;\n        proxy_set_header Host $host;\n        proxy_cache_bypass $http_upgrade;\n        proxy_set_header X-Real-IP $remote_addr;\n        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;\n        proxy_set_header X-Forwarded-Proto $scheme;\n        proxy_read_timeout 300s;\n        proxy_connect_timeout 300s;\n        proxy_send_timeout 300s;\n    }\n    location /health {\n        proxy_pass http://localhost:3002/health;\n        proxy_http_version 1.1;\n        proxy_set_header Host $host;\n    }\n    listen 80;\n}\n' > /etc/nginx/sites-available/app.successkod.com
              ln -sf /etc/nginx/sites-available/app.successkod.com /etc/nginx/sites-enabled/
            fi
            
            # Redirect hranitel.daniillepekhin.com to app.successkod.com
            printf 'server {\n    server_name hranitel.daniillepekhin.com;\n    return 301 https://app.successkod.com$request_uri;\n    listen 80;\n}\n' > /etc/nginx/sites-available/hranitel-redirect
            ln -sf /etc/nginx/sites-available/hranitel-redirect /etc/nginx/sites-enabled/
            
            nginx -t && systemctl reload nginx
            
            echo "✅ Nginx configured: app.successkod.com (main), hranitel.daniillepekhin.com → redirect"

            # 📊 Final deployment report
            echo ""
            echo "════════════════════════════════════════════════════════════"
            echo "✅ DEPLOYMENT COMPLETED SUCCESSFULLY!"
            echo "════════════════════════════════════════════════════════════"
            echo ""
            echo "🌐 Frontend: https://app.successkod.com"
            echo "🔌 Backend API: https://app.successkod.com/api/"
            echo "🏥 Health Check: https://app.successkod.com/health"
            echo "🏥 Readiness Check: https://app.successkod.com/health/ready"
            echo ""
            echo "📊 Database Status:"
            psql "$DATABASE_URL" -c "SELECT COUNT(*) as total_users FROM users;" | head -3 | tail -1 | xargs echo "Total users:"
            echo ""
            echo "📊 Scheduler Status:"
            echo "Queue size: $(redis-cli ZCARD scheduler:queue 2>/dev/null || echo 'Redis not available')"
            echo ""
            echo "🔄 PM2 Processes:"
            pm2 status
            echo ""
            echo "════════════════════════════════════════════════════════════"

      - name: Setup Cron Job for Materialized Views
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: false
          command_timeout: 2m
          script: |
            echo "🕐 Setting up cron job for materialized views..."

            # Create refresh script
            cat > /usr/local/bin/refresh_ratings.sh << 'EOFSCRIPT'
            #!/bin/bash
            if [ -f /var/www/hranitel/backend/.env ]; then
              export $(grep DATABASE_URL /var/www/hranitel/backend/.env | xargs)
            fi
            psql "$DATABASE_URL" -c "SELECT refresh_ratings_cache();" >> /var/log/ratings_refresh.log 2>&1
            echo "$(date '+%Y-%m-%d %H:%M:%S') - Refresh completed with status $?" >> /var/log/ratings_refresh.log
            EOFSCRIPT

            chmod +x /usr/local/bin/refresh_ratings.sh

            # Add to crontab
            CRON_LINE="5 * * * * /usr/local/bin/refresh_ratings.sh"
            (crontab -l 2>/dev/null | grep -q "/usr/local/bin/refresh_ratings.sh") || {
              (crontab -l 2>/dev/null; echo "$CRON_LINE") | crontab -
              echo "✅ Cron job added"
            }

            echo "✅ Cron setup completed"

      - name: Setup Energy Expiry Cron Job
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: false
          command_timeout: 2m
          script: |
            echo "⚡ Setting up energy expiry cron job..."

            # Create energy expiry script
            cat > /usr/local/bin/process_expired_energies.sh << 'EOFSCRIPT'
            #!/bin/bash
            CRON_SECRET="local-dev-secret"
            if [ -f /var/www/hranitel/backend/.env ]; then
              STORED_SECRET=$(grep CRON_SECRET /var/www/hranitel/backend/.env | cut -d= -f2-)
              if [ -n "$STORED_SECRET" ]; then
                CRON_SECRET="$STORED_SECRET"
              fi
            fi
            RESULT=$(curl -s -X POST http://localhost:3002/api/webhooks/cron/process-expired-energies \
              -H "Content-Type: application/json" \
              -H "x-cron-secret: $CRON_SECRET")
            echo "$(date '+%Y-%m-%d %H:%M:%S') - Result: $RESULT" >> /var/log/energy_expiry.log
            EOFSCRIPT

            chmod +x /usr/local/bin/process_expired_energies.sh

            # Run daily at 03:00 UTC (06:00 MSK)
            CRON_LINE="0 3 * * * /usr/local/bin/process_expired_energies.sh"
            (crontab -l 2>/dev/null | grep -q "process_expired_energies.sh") || {
              (crontab -l 2>/dev/null; echo "$CRON_LINE") | crontab -
              echo "✅ Energy expiry cron job added (daily 06:00 MSK)"
            }

            echo "✅ Energy expiry cron setup completed"

      - name: Setup Chat Schedule Cron Jobs
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: false
          command_timeout: 2m
          script: |
            echo "🕐 Setting up chat schedule cron jobs..."

            SCRIPTS_DIR="/var/www/hranitel/backend/scripts"

            # Make scripts executable
            chmod +x "${SCRIPTS_DIR}/chat_open_morning.sh" 2>/dev/null || true
            chmod +x "${SCRIPTS_DIR}/chat_close_evening.sh" 2>/dev/null || true
            chmod +x "${SCRIPTS_DIR}/city_chats_close_sunday.sh" 2>/dev/null || true
            chmod +x "${SCRIPTS_DIR}/city_chats_open_monday.sh" 2>/dev/null || true

            # Chat schedule cron entries (Moscow time = UTC+3)
            # Main additional channel (old logic):
            # 10:00 MSK = 07:00 UTC - Open chat
            # 22:00 MSK = 19:00 UTC - Close chat
            CRON_MORNING="0 7 * * * ${SCRIPTS_DIR}/chat_open_morning.sh"
            CRON_EVENING="0 19 * * * ${SCRIPTS_DIR}/chat_close_evening.sh"
            
            # City chats (new logic - weekly schedule):
            # Sunday 10:00 MSK = 07:00 UTC - Close all city chats with message
            # Monday 10:00 MSK = 07:00 UTC - Open all city chats (no message)
            CRON_CITY_CLOSE="0 7 * * 0 ${SCRIPTS_DIR}/city_chats_close_sunday.sh"
            CRON_CITY_OPEN="0 7 * * 1 ${SCRIPTS_DIR}/city_chats_open_monday.sh"

            # Remove old entries and add new ones
            (crontab -l 2>/dev/null | grep -v "chat_open_morning.sh" | grep -v "chat_close_evening.sh" | grep -v "city_chats_close_sunday.sh" | grep -v "city_chats_open_monday.sh"; echo "${CRON_MORNING}"; echo "${CRON_EVENING}"; echo "${CRON_CITY_CLOSE}"; echo "${CRON_CITY_OPEN}") | crontab -

            echo "✅ Chat schedule cron jobs configured:"
            echo "  - Main channel morning (10:00 MSK / 07:00 UTC): chat_open_morning.sh"
            echo "  - Main channel evening (22:00 MSK / 19:00 UTC): chat_close_evening.sh"
            echo "  - City chats Sunday close (10:00 MSK / 07:00 UTC): city_chats_close_sunday.sh"
            echo "  - City chats Monday open (10:00 MSK / 07:00 UTC): city_chats_open_monday.sh"

            echo "📋 Current crontab:"
            crontab -l

      - name: Notify Deployment Status
        if: always()
        run: |
          if [ ${{ job.status }} == 'success' ]; then
            echo "✅ Deployment successful!"
          else
            echo "❌ Deployment failed!"
          fi
